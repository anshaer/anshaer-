<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VRM Live Debug Version</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #0f0; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #0f0; width: 250px; }
        #video-preview { position: absolute; bottom: 10px; right: 10px; width: 200px; height: 150px; border: 1px solid #0f0; transform: scaleX(-1); background: #000; }
        #debug-log { font-size: 10px; height: 100px; overflow-y: auto; border-top: 1px solid #444; margin-top: 10px; padding-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <b>VRM_LIVE_SYSTEM</b>
        <input type="file" id="vrm-upload" accept=".vrm" style="width:100%; margin:10px 0;"/>
        <div id="status">STATUS: INITIALIZING...</div>
        <div id="debug-log">Log: System starting...</div>
    </div>

    <video id="video-preview" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.2/lib/three-vrm.pkgd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.it.js"></script>

    <script>
        const logEl = document.getElementById('debug-log');
        const statusEl = document.getElementById('status');
        function debug(msg) { 
            logEl.innerHTML += `<div>> ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 3);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        let currentVrm = null;
        const loader = new THREE.GLTFLoader();

        // --- 載入模型 ---
        document.getElementById('vrm-upload').onchange = (e) => {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            debug("Loading VRM file...");
            
            loader.load(url, async (gltf) => {
                const vrm = await THREE_VRM.VRM.from(gltf);
                if (currentVrm) scene.remove(currentVrm.scene);
                currentVrm = vrm;
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI;
                debug("VRM Loaded & Added to Scene");
                statusEl.innerText = "STATUS: TRACKING_ACTIVE";
            }, undefined, (err) => debug("Load Error: " + err));
        };

        // --- 追蹤核心 ---
        const videoElement = document.getElementById('video-preview');
        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });

        holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true });

        holistic.onResults((results) => {
            if (!currentVrm) return;

            // 檢查是否有捕捉到臉部
            if (results.faceLandmarks) {
                // 調用 Kalidokit
                const faceRig = Kalidokit.Face.solve(results.faceLandmarks, { runtime: "mediapipe", video: videoElement });
                
                if (faceRig) {
                    const head = currentVrm.humanoid.getNormalizedBoneNode('head');
                    // 直接強制賦值測試
                    head.rotation.y = faceRig.degrees.y * (Math.PI / 180);
                    head.rotation.x = faceRig.degrees.x * (Math.PI / 180);
                    
                    // 表情
                    const em = currentVrm.expressionManager;
                    em.setValue('aa', faceRig.mouth.shape.A);
                    em.setValue('blink', 1 - faceRig.eye.l);
                }
            }
        });

        // 啟動相機
        const cam = new Camera(videoElement, {
            onFrame: async () => { await holistic.send({ image: videoElement }); },
            width: 640, height: 480
        });
        
        cam.start().then(() => debug("Camera Started")).catch(e => debug("Camera Fail: " + e));

        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(1/60);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
