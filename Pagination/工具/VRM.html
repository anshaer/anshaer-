<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Web VRM Camera Live</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #controls { position: absolute; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: auto; }
        #video-preview { position: absolute; bottom: 20px; right: 20px; width: 200px; height: 150px; background: #000; border: 2px solid #00ff00; transform: scaleX(-1); border-radius: 8px; z-index: 50; }
        #status { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>VRM 實時動態捕捉</h3>
        <input type="file" id="vrm-upload" accept=".vrm" />
        <p>狀態: <span id="status">等待上傳...</span></p>
    </div>

    <video id="video-preview" autoplay playsinline></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.2/lib/three-vrm.pkgd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.it.js"></script>

    <script>
        // 檢查環境
        const statusEl = document.getElementById('status');
        const { VRM, VRMUtils } = THREE_VRM;

        // --- Three.js 基礎設定 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        scene.add(new THREE.DirectionalLight(0xffffff, 1.0));
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        let currentVrm = null;

        // --- 核心：修正後的載入函式 ---
        document.getElementById('vrm-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusEl.innerText = "讀取檔案中...";
            const url = URL.createObjectURL(file);

            // 必須明確實例化 GLTFLoader
            const loader = new THREE.GLTFLoader();
            
            // 告訴 GLTFLoader 如何處理 VRM 檔案
            loader.crossOrigin = 'anonymous';
            
            loader.load(
                url,
                async (gltf) => {
                    statusEl.innerText = "解析模型中...";
                    
                    // 清除舊模型
                    if (currentVrm) {
                        scene.remove(currentVrm.scene);
                        VRMUtils.deepDispose(currentVrm.scene);
                    }

                    try {
                        // 使用 VRM.from(gltf) 將普通 gltf 轉為 VRM 物件
                        const vrm = await VRM.from(gltf);
                        currentVrm = vrm;
                        scene.add(vrm.scene);
                        
                        // 旋轉模型面對相機並調整位置
                        vrm.scene.rotation.y = Math.PI;
                        
                        statusEl.innerText = "模型載入成功！";
                        console.log("VRM Loaded:", vrm);
                    } catch (err) {
                        console.error(err);
                        statusEl.innerText = "VRM 解析失敗，請檢查檔案格式。";
                    }
                },
                (progress) => {
                    const percent = (progress.loaded / progress.total * 100).toFixed(0);
                    statusEl.innerText = `載入中: ${percent}%`;
                },
                (error) => {
                    console.error(error);
                    statusEl.innerText = "載入錯誤，請看 Console。";
                }
            );
        });

        // --- Mediapipe 追蹤邏輯 ---
        const videoElement = document.getElementById('video-preview');
        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`,
        });

        holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true });
        
        holistic.onResults((results) => {
            if (!currentVrm) return;

            // 使用 Kalidokit 計算旋轉數據
            const faceRig = Kalidokit.Face.solve(results.faceLandmarks, { runtime: "mediapipe", video: videoElement });
            
            if (faceRig && currentVrm.humanoid) {
                // 套用頭部旋轉
                const head = currentVrm.humanoid.getNormalizedBoneNode('head');
                if (head) {
                    head.rotation.set(
                        faceRig.degrees.x * (Math.PI / 180),
                        faceRig.degrees.y * (Math.PI / 180),
                        faceRig.degrees.z * (Math.PI / 180)
                    );
                }

                // 套用表情
                const s = currentVrm.expressionManager;
                s.setValue('ih', faceRig.mouth.shape.I);
                s.setValue('aa', faceRig.mouth.shape.A);
                s.setValue('blink', 1 - faceRig.eye.l);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await holistic.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraFeed.start();

        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(1/60);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
