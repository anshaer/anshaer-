<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VRM Player Final</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0f0; width: 280px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #fff; }
        input { width: 100%; background: #222; color: #0f0; border: 1px solid #444; padding: 5px; }
        #status { margin-top: 10px; font-weight: bold; color: #ff0; padding: 5px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="ui">
        <b>> VRM_ANIMATION_SYSTEM</b><hr>
        <div class="input-group">
            <label>1. 上傳模型 (.vrm)</label>
            <input type="file" id="vrm-upload" accept=".vrm" />
        </div>
        <div class="input-group">
            <label>2. 上傳動作 (.vrma)</label>
            <input type="file" id="vrma-upload" accept=".vrma" disabled />
        </div>
        <div id="status">狀態：等待載入模型...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.2/lib/three-vrm.pkgd.min.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const vrmaInput = document.getElementById('vrma-upload');

        // --- 1. 初始化 Three.js ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0);
        controls.update();

        scene.add(new THREE.DirectionalLight(0xffffff, 1.0), new THREE.AmbientLight(0xffffff, 0.6));

        let currentVrm = null;
        let mixer = null;
        
        // 使用全域變數中的載入器
        const loader = new THREE.GLTFLoader();
        // 註冊插件 (從全域物件 THREE_VRM 取得)
        loader.register((parser) => new THREE_VRM.VRMLoaderPlugin(parser));
        loader.register((parser) => new THREE_VRM.VRMAnimationLoaderPlugin(parser));

        // --- 2. 處理模型載入 ---
        document.getElementById('vrm-upload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusEl.innerText = "狀態：正在讀取模型檔案...";
            const url = URL.createObjectURL(file);

            loader.load(url, (gltf) => {
                const vrm = gltf.userData.vrm;
                if (!vrm) {
                    statusEl.innerText = "狀態：錯誤！非有效 VRM";
                    return;
                }

                if (currentVrm) {
                    scene.remove(currentVrm.scene);
                    THREE_VRM.VRMUtils.deepDispose(currentVrm.scene);
                }

                currentVrm = vrm;
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI; // 轉向正面
                
                vrmaInput.disabled = false;
                statusEl.innerText = "狀態：模型就緒！請選擇動作";
                URL.revokeObjectURL(url);
            }, 
            undefined, 
            (err) => {
                statusEl.innerText = "狀態：載入失敗 (查看 Console)";
                console.error(err);
            });
        };

        // --- 3. 處理 VRMA 動作載入 ---
        vrmaInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !currentVrm) return;

            statusEl.innerText = "狀態：載入動作中...";
            const url = URL.createObjectURL(file);

            loader.load(url, (gltf) => {
                const vrmAnimations = gltf.userData.vrmAnimations;
                if (!vrmAnimations || vrmAnimations.length === 0) {
                    statusEl.innerText = "錯誤：檔案無動畫數據";
                    return;
                }

                mixer = new THREE.AnimationMixer(currentVrm.scene);
                const clip = vrmAnimations[0].createAnimationClip(currentVrm);
                mixer.clipAction(clip).play();

                statusEl.innerText = "狀態：動起來了！";
                URL.revokeObjectURL(url);
            });
        };

        // --- 4. 渲染迴圈 ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (mixer) mixer.update(delta);
            if (currentVrm) currentVrm.update(delta);
            
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
