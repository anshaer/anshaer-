<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VRM Live - Final Version</title>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #0f0; }
        #video-preview { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px; border: 1px solid #0f0; transform: scaleX(-1); }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div>System: VRM_LOADER_ONLINE</div>
        <input type="file" id="vrm-upload" accept=".vrm" />
        <div id="status">Status: IDLE</div>
    </div>

    <video id="video-preview" autoplay playsinline></video>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.2/lib/three-vrm.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRM, VRMUtils } from '@pixiv/three-vrm';

        const statusEl = document.getElementById('status');
        const videoElement = document.getElementById('video-preview');

        // --- 場景初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 3);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.DirectionalLight(0xffffff, 1), new THREE.AmbientLight(0xffffff, 0.5));

        let currentVrm = null;
        const loader = new GLTFLoader();

        // --- 檔案處理 ---
        document.getElementById('vrm-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusEl.innerText = "Status: LOADING_FILE...";
            const url = URL.createObjectURL(file);

            loader.load(url, async (gltf) => {
                statusEl.innerText = "Status: VRM_PARSING...";
                try {
                    const vrm = await VRM.from(gltf);
                    if (currentVrm) {
                        scene.remove(currentVrm.scene);
                        VRMUtils.deepDispose(currentVrm.scene);
                    }
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    vrm.scene.rotation.y = Math.PI;
                    statusEl.innerText = "Status: SUCCESS_RUNNING";
                } catch (err) {
                    statusEl.innerText = "Status: ERROR_PARSING";
                    console.error(err);
                }
            }, 
            (xhr) => {
                statusEl.innerText = `Status: ${Math.round(xhr.loaded/xhr.total*100)}%`;
            },
            (err) => {
                statusEl.innerText = "Status: LOAD_FAILED";
                console.error(err);
            });
        };

        // --- Mediapipe 動態追蹤 (從 Window 存取) ---
        // 為了確保 Mediapipe 腳本正確，我們在下面用傳統方式載入
        const animate = () => {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(1/60);
            renderer.render(scene, camera);
        };
        animate();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.it.js"></script>
    
    <script>
        // 這部分處理鏡頭動態綁定
        const video = document.getElementById('video-preview');
        const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
        holistic.setOptions({ modelComplexity: 1 });
        holistic.onResults((res) => {
            // 動態綁定邏輯... (如前述)
        });
        const cam = new Camera(video, {onFrame: async () => await holistic.send({image: video}), width: 640, height: 480});
        cam.start();
    </script>
</body>
</html>
