<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VRM + VRMA Player</title>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0f0; width: 280px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #fff; }
        input { width: 100%; background: #222; color: #0f0; border: 1px solid #444; }
        #status { margin-top: 10px; font-size: 12px; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <b>> VRM_ANIMATION_SYSTEM</b><br><br>
        
        <div class="input-group">
            <label>1. 上傳模型 (.vrm)</label>
            <input type="file" id="vrm-upload" accept=".vrm" />
        </div>

        <div class="input-group">
            <label>2. 上傳動作 (.vrma)</label>
            <input type="file" id="vrma-upload" accept=".vrma" disabled />
        </div>

        <div id="status">狀態：等待載入模型...</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.2/lib/three-vrm.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMAnimationLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        const statusEl = document.getElementById('status');
        const vrmaInput = document.getElementById('vrma-upload');

        // --- 1. 初始化場景 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0);
        controls.update();

        scene.add(new THREE.DirectionalLight(0xffffff, 1.0), new THREE.AmbientLight(0xffffff, 0.6));

        // --- 2. 設定載入器 ---
        let currentVrm = null;
        let mixer = null; // 用於播放動畫
        
        const loader = new GLTFLoader();
        // 同時註冊 VRM 和 VRMA 插件
        loader.register((parser) => new VRMLoaderPlugin(parser));
        loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

        // --- 3. 處理模型載入 ---
        document.getElementById('vrm-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            statusEl.innerText = "狀態：載入模型中...";

            loader.load(url, (gltf) => {
                const vrm = gltf.userData.vrm;
                if (currentVrm) {
                    scene.remove(currentVrm.scene);
                    VRMUtils.deepDispose(currentVrm.scene);
                }
                currentVrm = vrm;
                scene.add(vrm.scene);
                vrm.scene.rotation.y = Math.PI;
                
                vrmaInput.disabled = false;
                statusEl.innerText = "狀態：模型就緒，請上傳動作檔";
                URL.revokeObjectURL(url);
            });
        };

        // --- 4. 處理 VRMA 動作載入 ---
        vrmaInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !currentVrm) return;

            const url = URL.createObjectURL(file);
            statusEl.innerText = "狀態：載入動作中...";

            loader.load(url, (gltf) => {
                const vrmAnimations = gltf.userData.vrmAnimations;
                if (!vrmAnimations || vrmAnimations.length === 0) {
                    statusEl.innerText = "錯誤：無效的 VRMA 檔案";
                    return;
                }

                // 建立動畫混合器
                mixer = new THREE.AnimationMixer(currentVrm.scene);
                
                // 將 VRMA 轉換為動畫 Clip 並播放
                const clip = vrmAnimations[0].createAnimationClip(currentVrm);
                mixer.clipAction(clip).play();

                statusEl.innerText = "狀態：正在播放動作";
                URL.revokeObjectURL(url);
            });
        };

        // --- 5. 渲染迴圈 ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (mixer) mixer.update(delta);
            if (currentVrm) currentVrm.update(delta);
            
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
