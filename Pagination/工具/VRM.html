<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VRM Animation System</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border: 1px solid #0f0; width: 280px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #fff; }
        input { width: 100%; background: #222; color: #0f0; border: 1px solid #444; }
        #status { margin-top: 10px; font-weight: bold; color: #ff0; }
    </style>
</head>
<body>

    <div id="ui">
        <b>> VRM_ANIMATION_SYSTEM</b><hr>
        <div class="input-group">
            <label>1. 上傳模型 (.vrm)</label>
            <input type="file" id="vrm-upload" accept=".vrm" />
        </div>
        <div class="input-group">
            <label>2. 上傳動作 (.vrma)</label>
            <input type="file" id="vrma-upload" accept=".vrma" disabled />
        </div>
        <div id="status">狀態：等待載入模型...</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.10/lib/three-vrm.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRM, VRMUtils } from '@pixiv/three-vrm';

        const statusEl = document.getElementById('status');
        const vrmaInput = document.getElementById('vrma-upload');

        // --- 場景初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.0, 0);
        controls.update();

        scene.add(new THREE.DirectionalLight(0xffffff, 1), new THREE.AmbientLight(0xffffff, 0.6));

        let currentVrm = null;
        let mixer = null;
        const loader = new GLTFLoader();

        // --- 模型載入 ---
        document.getElementById('vrm-upload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusEl.innerText = "狀態：正在解析模型...";
            const url = URL.createObjectURL(file);

            loader.load(url, async (gltf) => {
                // VRM 1.0 之前的版本載入方式
                VRM.from(gltf).then((vrm) => {
                    if (currentVrm) {
                        scene.remove(currentVrm.scene);
                        VRMUtils.deepDispose(currentVrm.scene);
                    }
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    vrm.scene.rotation.y = Math.PI;
                    
                    vrmaInput.disabled = false;
                    statusEl.innerText = "狀態：模型就緒，請上傳動作";
                    console.log("Model Loaded");
                }).catch(err => {
                    statusEl.innerText = "狀態：模型解析出錯";
                    console.error(err);
                });
            });
        };

        // --- 動作載入 ---
        vrmaInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !currentVrm) return;

            statusEl.innerText = "狀態：正在讀取動作...";
            const url = URL.createObjectURL(file);

            // 針對 .vrma，我們需要使用 AnimationMixer
            loader.load(url, (gltf) => {
                // 嘗試獲取動畫 clip
                const clips = gltf.animations;
                if (clips && clips.length > 0) {
                    mixer = new THREE.AnimationMixer(currentVrm.scene);
                    const action = mixer.clipAction(clips[0]);
                    action.play();
                    statusEl.innerText = "狀態：播放動作中";
                } else {
                    statusEl.innerText = "狀態：此檔案無動畫數據";
                }
            });
        };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            if (currentVrm) currentVrm.update(delta);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
