<!DOCTYPE html>
<html>
<head>
    <title>Web VRM Loader</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <input type="file" id="vrm_input" accept=".vrm">
        <p>請上傳你的 .vrm 模型</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.2/lib/three-vrm.module.js"
            }
        }
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
