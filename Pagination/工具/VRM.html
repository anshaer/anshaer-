<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VRM Live Web</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 1px solid #444; }
        #video-preview { position: absolute; bottom: 20px; right: 20px; width: 200px; height: 150px; border: 2px solid #555; border-radius: 8px; transform: scaleX(-1); }
        #status { color: #ffcc00; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>VRM 控制面板</h3>
        <input type="file" id="vrm-upload" accept=".vrm" />
        <span id="status">狀態：等待載入套件...</span>
    </div>

    <video id="video-preview" autoplay playsinline></video>
    <div id="container"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.2/lib/three-vrm.pkgd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1675235345/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.it.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        
        // 確保所有套件都載入完成
        window.onload = () => {
            statusEl.innerText = "狀態：準備就緒，請上傳 VRM";
        };

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        let currentVrm = null;

        // --- 上傳與載入邏輯 ---
        document.getElementById('vrm-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusEl.innerText = "狀態：正在讀取檔案...";
            const url = URL.createObjectURL(file);
            
            // 使用內建在 window 的 THREE.GLTFLoader
            const loader = new THREE.GLTFLoader();
            
            loader.load(
                url,
                async (gltf) => {
                    statusEl.innerText = "狀態：正在轉換為 VRM...";
                    try {
                        // 使用正確的 Namespace 呼叫
                        const vrm = await THREE_VRM.VRM.from(gltf);
                        
                        if (currentVrm) {
                            scene.remove(currentVrm.scene);
                            THREE_VRM.VRMUtils.deepDispose(currentVrm.scene);
                        }

                        currentVrm = vrm;
                        scene.add(vrm.scene);
                        vrm.scene.rotation.y = Math.PI; // 轉向正面
                        
                        statusEl.innerText = "狀態：載入成功！請開啟鏡頭";
                        console.log("VRM 載入完成", vrm);
                    } catch (err) {
                        console.error("VRM 轉換錯誤:", err);
                        statusEl.innerText = "狀態：VRM 格式解析失敗";
                    }
                },
                (xhr) => {
                    const p = (xhr.loaded / xhr.total * 100).toFixed(0);
                    statusEl.innerText = `狀態：載入中 (${p}%)`;
                },
                (error) => {
                    console.error("Loader 錯誤:", error);
                    statusEl.innerText = "狀態：檔案格式錯誤";
                }
            );
        });

        // --- Mediapipe 與 Kalidokit 動態綁定 ---
        const videoElement = document.getElementById('video-preview');
        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`,
        });

        holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true });
        
        holistic.onResults((results) => {
            if (!currentVrm) return;

            // 計算臉部旋轉與表情
            const faceRig = Kalidokit.Face.solve(results.faceLandmarks, { 
                runtime: "mediapipe", 
                video: videoElement 
            });
            
            if (faceRig) {
                const head = currentVrm.humanoid.getNormalizedBoneNode('head');
                // 緩動旋轉 (平滑處理)
                head.rotation.set(
                    faceRig.degrees.x * (Math.PI / 180) * 0.8,
                    faceRig.degrees.y * (Math.PI / 180) * 0.8,
                    faceRig.degrees.z * (Math.PI / 180) * 0.8
                );

                // 嘴型與眨眼
                const expressions = currentVrm.expressionManager;
                expressions.setValue('ih', faceRig.mouth.shape.I);
                expressions.setValue('aa', faceRig.mouth.shape.A);
                expressions.setValue('blink', 1 - faceRig.eye.l);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await holistic.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraFeed.start().catch(() => statusEl.innerText = "狀態：鏡頭啟動失敗");

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (currentVrm) currentVrm.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
