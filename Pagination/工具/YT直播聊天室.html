<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機實名觀測站</title>
    <style>
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #setup { background: #1a1a1a; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; }
        button { background: #3ea6ff; color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { margin-bottom: 12px; font-size: 15px; border-bottom: 1px solid #111; padding-bottom: 8px; }
        .name { color: #ffca28; font-weight: bold; }
        .handle { color: #3ea6ff; font-size: 12px; margin-left: 5px; }
        .content { margin-top: 4px; display: block; color: #fff; }
    </style>
</head>
<body>

<div id="setup">
    <input type="text" id="ytUrl" placeholder="貼上直播或聊天室網址">
    <button onclick="start()">啟動監控</button>
</div>
<div id="chat-box"></div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzTjapDkTE3WM8i5qS8ROEAdVVcS2ehBIs-iRXWdaj6Cnl3Zcx9qT-nn3aMZDl-XUxdXg/exec'; 
    let timer = null;

    function parseVid(url) {
        const match = url.match(/(?:v=|\/live\/|\/live_chat\?v=|youtu\.be\/)([^"&?\/\s]{11})/);
        return match ? match[1] : null;
    }

    async function start() {
        const vid = parseVid(document.getElementById('ytUrl').value);
        if (!vid) return alert("網址解析失敗");
        if (timer) clearInterval(timer);
        
        document.getElementById('chat-box').innerHTML = "正在連線雲端小秘書...";
        fetchData(vid);
        timer = setInterval(() => fetchData(vid), 5000);
    }

    async function fetchData(vid) {
        try {
            const res = await fetch(`${GAS_URL}?vid=${vid}`);
            const data = await res.json();
            const box = document.getElementById('chat-box');
            
            box.innerHTML = ""; 
            data.forEach(m => {
                box.innerHTML += `
                    <div class="msg">
                        <span class="name">${m.name}</span>
                        <span class="handle">(@${m.handle.replace('@','')})</span>
                        <span class="content">${m.text}</span>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
