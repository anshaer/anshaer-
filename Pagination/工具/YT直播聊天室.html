<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機實名觀測站</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .msg { padding: 10px; border-bottom: 1px solid #222; }
        .name { color: #ffca28; font-weight: bold; }
        .handle { color: #3ea6ff; font-size: 12px; }
    </style>
</head>
<body>
    <div id="chat-box">載入中...</div>

    <script>
        const GAS_URL = '你的_GAS_網址_貼在這裡';
        const VIDEO_ID = '你的_直播_ID';

        async function refresh() {
            try {
                const res = await fetch(`${GAS_URL}?vid=${VIDEO_ID}`);
                const data = await res.json();
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                data.forEach(m => {
                    box.innerHTML += `<div class="msg"><span class="name">${m.name}</span> <span class="handle">(@${m.handle})</span>: ${m.text}</div>`;
                });
                window.scrollTo(0, document.body.scrollHeight);
            } catch (e) { console.error(e); }
        }

        setInterval(refresh, 5000); // 5秒自動更新一次
        refresh();
    </script>
</body>
</html>
