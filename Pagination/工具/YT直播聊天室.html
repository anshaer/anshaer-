<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 聊天室解析測試</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --accent: #3ea6ff;
            --text: #ffffff;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            background: var(--panel);
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid #333;
        }
        .input-box {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        input {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
        }
        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            height: 35px;
            align-self: flex-end;
        }
        #chat-frame-container {
            flex: 1;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div id="header">
    <div class="input-box">
        <label>YouTube 連結 (直播/影片/短連結)</label>
        <input type="text" id="urlInput" placeholder="貼上網址...">
    </div>
    <div class="input-box">
        <label>API Key (選填，若腳本已寫死可不填)</label>
        <input type="password" id="keyInput" placeholder="輸入 API 金鑰">
    </div>
    <button onclick="startChat()">載入</button>
</div>

<div id="chat-frame-container">
    <div style="padding: 20px; color: #555; text-align: center;">載入後聊天室將顯示於此</div>
</div>

<script>
    // 初始化：嘗試抓取上次存的 Key
    window.onload = () => {
        const savedKey = localStorage.getItem('AIzaSyB0FlaHE7Eq2Xz_EdBt7ar02l40ryk7Qps');
        if (savedKey) document.getElementById('keyInput').value = savedKey;
    };

    function startChat() {
        const url = document.getElementById('urlInput').value.trim();
        const key = document.getElementById('keyInput').value.trim();
        
        if (!url) return alert('請輸入網址');

        // 儲存 Key 供腳本讀取 (如果腳本沒寫死的話)
        if (key) localStorage.setItem('AIzaSyB0FlaHE7Eq2Xz_EdBt7ar02l40ryk7Qps', key);

        // 解析 Video ID (Regex)
        const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?|live|shorts)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
        const match = url.match(regex);
        let videoId = (match && match[1]) ? match[1] : (url.length === 11 ? url : null);

        if (!videoId) return alert('無法辨識 Video ID');

        // 取得當前網域
        const domain = window.location.hostname || 'localhost';
        const chatUrl = `https://www.youtube.com/live_chat?v=${videoId}&embed_domain=${domain}&dark_theme=1`;

        // 渲染 Iframe
        document.getElementById('chat-frame-container').innerHTML = 
            `<iframe src="${chatUrl}"></iframe>`;
            
        console.log("成功載入：", videoId, "網域：", domain);
    }
</script>

</body>
</html>
