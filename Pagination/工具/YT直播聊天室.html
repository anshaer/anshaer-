<script>
    function launch() {
        const url = document.getElementById('ytUrl').value.trim();
        const key = document.getElementById('apiKey').value.trim();
        
        if(!url || !key) return alert("請填寫資料");

        // 存入 localStorage
        localStorage.setItem('yt_api_key', key);
        
        const vidMatch = url.match(/(?:v=|\/live\/|youtu\.be\/)([^"&?\/\s]{11})/);
        if(!vidMatch) return alert("網址無效");
        
        const domain = window.location.hostname;
        // 確保 iframe 載入
        const chatUrl = `https://www.youtube.com/live_chat?v=${vidMatch[1]}&embed_domain=${domain}`;
        document.getElementById('chat-container').innerHTML = `<iframe src="${chatUrl}"></iframe>`;
        document.getElementById('setup-ui').style.display = 'none';
    }
</script>
