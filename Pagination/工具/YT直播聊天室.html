<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>OBS YouTube Chat Pro</title>
    <style>
        /* OBS 透明背景設定 */
        body { background: transparent; margin: 0; padding: 0; overflow: hidden; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        #setup-ui { background: rgba(30, 30, 30, 0.9); padding: 20px; position: absolute; z-index: 999; width: 100%; box-sizing: border-box; }
        input { padding: 8px; margin-right: 5px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }
        button { padding: 8px 15px; background: #3ea6ff; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        #container { width: 100vw; height: 100vh; position: relative; background: transparent; }
        iframe { width: 100%; height: 100%; border: none; background: transparent; }
    </style>
</head>
<body>

<div id="setup-ui">
    <input type="text" id="ytUrl" placeholder="直播網址">
    <input type="password" id="apiKey" placeholder="API Key">
    <button onclick="launch()">套用並隱藏介面</button>
    <p style="color: #aaa; font-size: 12px; margin-top: 5px;">* 點擊按鈕後介面會消失，方便 OBS 擷取。重新整理網頁可再次顯示。</p>
</div>

<div id="container"></div>

<script>
    const nameCache = new Map();

    function launch() {
        const url = document.getElementById('ytUrl').value;
        const key = document.getElementById('apiKey').value;
        if(!url || !key) return alert("請輸入網址與 API Key");

        localStorage.setItem('yt_api_key', key);
        const vid = url.match(/(?:v=|\/live\/|youtu\.be\/)([^"&?\/\s]{11})/)[1];
        const domain = window.location.hostname || "localhost";
        
        // 1. 載入 Iframe (完全免費抓留言)
        const chatUrl = `https://www.youtube.com/live_chat?v=${vid}&embed_domain=${domain}&dark_theme=1`;
        document.getElementById('container').innerHTML = `<iframe id="chatFrame" src="${chatUrl}"></iframe>`;
        document.getElementById('setup-ui').style.display = 'none';

        // 2. 啟動腳本監控 (這部分在跨網域下通常需要 Tampermonkey)
        // 注意：如果是在自己的網域下嵌入 YouTube，瀏覽器會限制 JS 存取 Iframe 內容
        // 所以你依然需要啟動你之前安裝的那個 Tampermonkey 腳本。
    }
</script>
</body>
</html>
