<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anshaer 自製直播聊天室</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #setup { background: #1e1e1e; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #333; }
        input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
        button { background: #3ea6ff; color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 14px; line-height: 1.4; }
        .author { font-weight: bold; color: #3ea6ff; margin-right: 5px; }
        .text { color: #eee; }
        .handle { font-size: 11px; color: #888; margin-right: 5px; }
    </style>
</head>
<body>

<div id="setup">
    <input type="text" id="ytUrl" placeholder="輸入直播連結...">
    <input type="password" id="apiKey" placeholder="輸入 API Key">
    <button onclick="startMonitoring()">開始監控聊天室</button>
</div>

<div id="chat-box" id="chatBox">
    </div>

<script>
    let nextPoll = null;
    let chatPageToken = "";

    async function startMonitoring() {
        const url = document.getElementById('ytUrl').value;
        const key = document.getElementById('apiKey').value;
        if(!url || !key) return alert("請填寫網址與 Key");

        localStorage.setItem('yt_api_key', key);

        // 1. 解析 Video ID
        const vid = url.match(/(?:v=|\/live\/|youtu\.be\/)([^"&?\/\s]{11})/)[1];
        
        // 2. 獲取 LiveChatID
        try {
            const videoRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${vid}&key=${key}`);
            const videoData = await videoRes.json();
            const liveChatId = videoData.items[0].liveStreamingDetails.activeLiveChatId;
            
            document.getElementById('setup').style.display = 'none'; // 隱藏設定區
            fetchMessages(liveChatId, key);
        } catch(e) {
            alert("獲取直播資訊失敗，請確認是否正在直播中。");
        }
    }

    async function fetchMessages(chatId, key) {
        let url = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${chatId}&part=snippet,authorDetails&key=${key}`;
        if (chatPageToken) url += `&pageToken=${chatPageToken}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            chatPageToken = data.nextPageToken;

            const chatBox = document.getElementById('chat-box');
            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'msg';
                // 這裡就是你要的：同時顯示 名稱 + @ID
                div.innerHTML = `
                    <span class="author">${item.authorDetails.displayName}</span>
                    <span class="handle">(@${item.authorDetails.channelId.substring(0,8)}...)</span>
                    <span class="text">${item.snippet.displayMessage}</span>
                `;
                chatBox.appendChild(div);
            });

            chatBox.scrollTop = chatBox.scrollHeight;
            
            // 根據 YouTube 建議的間隔時間抓取下一波 (通常是幾秒)
            setTimeout(() => fetchMessages(chatId, key), data.pollingIntervalMillis);
        } catch(e) {
            console.error("抓取留言失敗", e);
        }
    }
</script>
</body>
</html>
