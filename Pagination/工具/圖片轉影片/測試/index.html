<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 3秒真影片 - 專業彈幕版</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>圖片轉 3s 影片</h2>
    <p class="subtitle">自定義主浮水印與時間軸彈幕</p>

    <div class="input-group">
        <label>1. 選擇來源圖片</label>
        <input type="file" id="uploader" accept="image/*">
    </div>

    <div class="input-group">
        <label>2. 固定浮水印 (主標題)</label>
        <input type="text" id="videoText" value="禁止盜用" placeholder="輸入文字內容...">
        
        <div class="slider-box">
            <div class="color-row">
                <label>文字顏色</label>
                <input type="color" id="textColor" value="#ffffff">
                <span id="colorHex" style="font-size: 12px; color: #666;">#FFFFFF</span>
            </div>
            <div class="slider-row">
                <label>文字大小</label>
                <input type="range" id="fontSize" min="20" max="250" value="80">
                <span class="val-display" id="fontSizeVal">80</span>
            </div>
            <div class="slider-row">
                <label>左右位置</label>
                <input type="range" id="posX" min="0" max="100" value="50">
                <span class="val-display" id="posXVal">50%</span>
            </div>
            <div class="slider-row">
                <label>上下位置</label>
                <input type="range" id="posY" min="0" max="100" value="50">
                <span class="val-display" id="posYVal">50%</span>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label>3. 彈幕內容與時間軸</label>
        <div style="background: #fffbe6; padding: 10px; border-radius: 8px; border: 1px solid #ffe58f; margin-bottom: 10px;">
            <p style="font-size: 12px; color: #856404; margin: 0;">
                💡 格式：<strong>文字,出現秒數,軌道(1-10)</strong><br>
                範例：<br>
                <code>第一條彈幕,0.5,2</code> (0.5秒在上方出現)<br>
                <code>這是下方的,1.2,8</code> (1.2秒在下方出現)
            </p>
        </div>
        <textarea id="danmakuText" rows="6" placeholder="直接輸入文字（自動分配時間）&#10;或使用格式：文字,秒數,軌道"></textarea>
        
        <div class="slider-box" style="margin-top: 10px;">
            <div class="slider-row">
                <label>飛行速度</label>
                <input type="range" id="danmakuSpeed" min="200" max="800" value="400">
                <span class="val-display" id="danmakuSpeedVal">中</span>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label>4. 輸出畫質</label>
        <select id="qualitySelect">
            <option value="480">480p (處理最快)</option>
            <option value="720" selected>720p (標準高清)</option>
            <option value="1080">1080p (極致細膩)</option>
        </select>
    </div>

    <button id="convertBtn">生成 3s 彈幕影片</button>
    <p id="statusDisplay">系統準備就緒</p>

    <div class="preview-box" id="previewBox">
        <video id="videoPreview" controls playsinline></video>
        <div class="action-buttons">
            <a id="downloadLink" class="download-link">⬇️ 下載影片到相簿</a>
            <button id="shareBtn" class="share-btn">📤 快速分享</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
