<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁圖片加密測試工具</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            text-align: center;
            color: #444;
            margin-bottom: 5px;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }
        h2 {
            margin-top: 0;
            color: #0066cc;
            border-bottom: 2px solid #eef;
            padding-bottom: 10px;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }
        input[type="file"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        textarea {
            height: 120px;
            font-family: monospace;
            resize: vertical;
        }
        button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #0055aa;
        }
        .result-preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ccc;
            border-radius: 4px;
            padding: 10px;
            background: #fafafa;
            min-height: 180px;
        }
        img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
        }
    </style>
    <script>
        // 限制只在授權網域下顯示，排除 localhost 與 127.0.0.1 阻擋
        const allowedDomains = ["www.anshaer.com", "anshaer.github.io"];
        
        window.onload = function() {
            const currentHost = window.location.hostname;
            // 如果不在授權網域清單內，直接拒絕
            if (!allowedDomains.includes(currentHost)) {
                document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:50px;'>存取被拒：未授權的網域</h1>";
                return;
            }
        };

        // 圖片轉換為 JSON
        function convertToJson() {
            const fileInput = document.getElementById('imageInput').files[0];
            if (!fileInput) {
                alert('請先上傳一張圖片！');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64String = e.target.result;
                const jsonObject = {
                    uploaded_at: new Date().toISOString(),
                    data: base64String
                };
                
                document.getElementById('jsonOutput').value = JSON.stringify(jsonObject, null, 2);
            };
            reader.readAsDataURL(fileInput);
        }

        // 下載產生的 JSON
        function downloadJson() {
            const jsonText = document.getElementById('jsonOutput').value;
            if (!jsonText) {
                alert('沒有 JSON 資料可以下載。');
                return;
            }
            
            const blob = new Blob([jsonText], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'encrypted_image.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 將 JSON 還原為圖片預覽
        function convertToImage() {
            const jsonText = document.getElementById('jsonInput').value;
            if (!jsonText) {
                alert('請先貼上 JSON 資料！');
                return;
            }

            try {
                const parsed = JSON.parse(jsonText);
                if (parsed && parsed.data) {
                    document.getElementById('outputImage').src = parsed.data;
                } else {
                    alert('JSON 格式錯誤：找不到 data 欄位');
                }
            } catch (e) {
                alert('JSON 解析失敗，請確認格式是否正確');
            }
        }
    </script>
</head>
<body>
    <h1>網頁圖片加密測試工具</h1>
    <p style="text-align: center; color: #666; margin-bottom: 10px;">（僅限在授權網域中執行）</p>
    
    <div class="container">
        <div class="panel">
            <h2>步驟一：圖片轉換為 JSON</h2>
            <label for="imageInput">選擇您要保護的圖片：</label>
            <input type="file" id="imageInput" accept="image/*">
            
            <button onclick="convertToJson()">轉換為 JSON</button>
            
            <label for="jsonOutput">產生的 JSON 內容：</label>
            <textarea id="jsonOutput" readonly placeholder="轉換後的內容會顯示在這裡..."></textarea>
            
            <button onclick="downloadJson()" style="background-color: #28a745;">下載為 JSON 檔案</button>
        </div>

        <div class="panel">
            <h2>步驟二：JSON 還原為圖片</h2>
            <label for="jsonInput">請貼上您的 JSON 資料：</label>
            <textarea id="jsonInput" placeholder='{"uploaded_at": "2026-...", "data": "data:image/png;base64,..."}'></textarea>
            
            <button onclick="convertToImage()">載入並顯示圖片</button>
            
            <label>圖片預覽：</label>
            <div class="result-preview">
                <img id="outputImage" src="" alt="還原後的圖片會顯示在這裡">
            </div>
        </div>
    </div>
</body>
</html>
