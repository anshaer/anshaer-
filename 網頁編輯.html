<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>整合式網頁編輯器 (主題切換版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #9cf6c7;
            --text-color: #69350F;
            --box-bg: rgba(255, 255, 255, 0.5);
            --border-color: #69350F;
        }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; }
        
        #toolbar { display: flex; padding: 10px 16px; gap: 8px; background-color: var(--bg-color); border-bottom: 2px solid var(--border-color); flex-wrap: wrap; align-items: center; }
        button { padding: 6px 12px; border-radius: 20px; border: none; background: var(--text-color); color: var(--bg-color); cursor: pointer; font-size: 13px; }
        button:hover { background: #5e300d; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #main { display: flex; flex: 1; overflow: hidden; }
        #display-area { flex: 1; border-right: 2px solid var(--border-color); padding: 10px; display: flex; flex-direction: column; position: relative;}
        
        #editor-text { width: 100%; height: 100%; resize: none; background: var(--box-bg); border: none; padding: 10px; color: var(--text-color); font-family: monospace; display: block; box-sizing: border-box; overflow-x: hidden; }
        #image-preview { width: 100%; height: 100%; object-fit: contain; background: white; display: none; }
        
        #preview-container { width: 100%; height: 100%; display: none; background: #eee; transition: width 0.3s ease; display: flex; justify-content: center; }
        #preview-iframe { width: 100%; height: 100%; border: none; background: white; transition: width 0.3s ease; }

        #sidebar { width: 280px; display: flex; flex-direction: column; border-left: 2px solid var(--border-color); background-color: var(--bg-color); }
        #file-list-container { flex: 1; padding: 10px; overflow-y: auto; border-bottom: 2px solid var(--border-color); }
        
        .file-item { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 12px 10px; 
            border-bottom: 1px solid var(--border-color); 
            cursor: pointer;
            transition: background 0.2s;
        }
        .file-item:hover { background: rgba(255, 255, 255, 0.4); }
        .file-actions { display: flex; gap: 12px; margin-left: 10px; font-size: 15px; }
        .file-action-btn { padding: 4px 6px; border-radius: 4px; }
        
        #console { height: 160px; background: rgba(255, 255, 255, 0.4); color: var(--text-color); padding: 10px; font-family: monospace; font-size: 13px; overflow-y: auto; border-top: 2px solid var(--border-color); }
    </style>
</head>
<body>

<div id="toolbar">
    <button id="save-btn" onclick="saveCurrentFile()">儲存💾</button>
    <button onclick="runCode()">運行▶️</button>
    <button onclick="stopCode()">暫停⏸️</button>
    <button onclick="downloadAll()">下載全部📥</button>
    
    <!-- 分開成兩個按鈕 -->
    <button onclick="document.getElementById('file-input').click()">📄 上傳檔案</button>
    <button onclick="document.getElementById('folder-input').click()">📁 上傳資料夾</button>
    
    <!-- 一般檔案上傳 -->
    <input type="file" id="file-input" multiple style="display:none" onchange="handleFiles(this.files, false)">
    <!-- 資料夾上傳 -->
    <input type="file" id="folder-input" multiple webkitdirectory directory style="display:none" onchange="handleFiles(this.files, true)">
    
    <span style="border-left: 1px solid #69350F; margin: 0 10px;"></span>
    <button onclick="setDevice('desktop')">電腦模式🖥️</button>
    <button onclick="setDevice('mobile')">手機模式📱</button>

    <div style="display: flex; gap: 6px; align-items: center; margin-left: auto;">
        <span style="font-size: 12px; font-weight: bold; margin-right: 4px; color: var(--text-color);">主題🧬:</span>
        <button onclick="setTheme('mint')" style="background: #9cf6c7; border: 2px solid #69350F; width: 20px; height: 20px; border-radius: 50%; padding: 0;" title="薄荷巧克力"></button>
        <button onclick="setTheme('dark-contrast')" style="background: #121212; border: 2px solid #FFFFFF; width: 20px; height: 20px; border-radius: 50%; padding: 0;" title="深色高對比"></button>
        <button onclick="setTheme('light-contrast')" style="background: #FFFFFF; border: 2px solid #000000; width: 20px; height: 20px; border-radius: 50%; padding: 0;" title="淺色高對比"></button>
        <button onclick="setTheme('pink-lolita')" style="background: #ffb3c6; border: 1px solid #883355; width: 20px; height: 20px; border-radius: 50%; padding: 0;" title="粉色蘿莉塔"></button>
        <button onclick="setTheme('blue-lolita')" style="background: #b3d1ff; border: 1px solid #2b5c8f; width: 20px; height: 20px; border-radius: 50%; padding: 0;" title="藍色蘿莉塔"></button>
        <button onclick="setTheme('harmonic-dark')" style="background: #1e1e24; border: 1px solid #3f3f46; width: 20px; height: 20px; border-radius: 50%; padding: 0;" title="和諧深配色"></button>
        <button onclick="setTheme('harmonic-light')" style="background: #f4f4f5; border: 1px solid #a1a1aa; width: 20px; height: 20px; border-radius: 50%; padding: 0;" title="和諧淺配色"></button>
    </div>
</div>

<div id="main">
    <div id="display-area">
        <textarea id="editor-text" placeholder="請點選右側檔案進行編輯"></textarea>
        <img id="image-preview" src="" alt="圖片預覽">
        <div id="preview-container"><iframe id="preview-iframe"></iframe></div>
    </div>
    
    <div id="sidebar">
        <div id="file-list-container">
            <h3>檔案列表🗃️</h3>
            <div style="display: flex; gap: 6px; margin-bottom: 10px;">
                <input type="text" id="new-file-name" placeholder="包含路徑 (如: css/main.css)" style="flex:1; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--box-bg); color: var(--text-color); font-size: 12px;">
                <button onclick="createNewFile()" style="font-size: 11px; padding: 4px 8px; border-radius: 4px;">建立➕</button>
            </div>
            <ul id="files" style="list-style: none; padding: 0;"></ul>
        </div>
        <div id="console">
            <div>> System Ready.</div>
        </div>
    </div>
</div>

<script>
    let files = {
        'index.html': { 
            type: 'text', 
            content: `<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><title>Hello World</title></head>
<body><h1>Hello World</h1></body></html>` 
        }
    }; 

    let currentFile = 'index.html';
    let isRunning = false;
    let editingFile = null;

    window.onload = () => {
        selectFile(currentFile);
        renderFileList();
    };

    function log(message, type = 'info') {
        const consoleEl = document.getElementById('console');
        const time = new Date().toLocaleTimeString();
        const color = type === 'error' ? '#8B0000' : '#69350F';
        consoleEl.innerHTML += `<div style="color: ${color}; margin-bottom: 4px;">[${time}] ${message}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight; 
    }

    function setTheme(theme) {
        const root = document.documentElement;
        switch(theme) {
            case 'mint': root.style.setProperty('--bg-color', '#9cf6c7'); root.style.setProperty('--text-color', '#69350F'); root.style.setProperty('--box-bg', 'rgba(255,255,255,0.5)'); root.style.setProperty('--border-color', '#69350F'); break;
            case 'dark-contrast': root.style.setProperty('--bg-color', '#121212'); root.style.setProperty('--text-color', '#FFFFFF'); root.style.setProperty('--box-bg', 'rgba(255,255,255,0.1)'); root.style.setProperty('--border-color', '#00FFFF'); break;
            case 'light-contrast': root.style.setProperty('--bg-color', '#FFFFFF'); root.style.setProperty('--text-color', '#000000'); root.style.setProperty('--box-bg', 'rgba(0,0,0,0.05)'); root.style.setProperty('--border-color', '#000000'); break;
            case 'pink-lolita': root.style.setProperty('--bg-color', '#ffe6f0'); root.style.setProperty('--text-color', '#883355'); root.style.setProperty('--box-bg', 'rgba(255,255,255,0.6)'); root.style.setProperty('--border-color', '#883355'); break;
            case 'blue-lolita': root.style.setProperty('--bg-color', '#e6f2ff'); root.style.setProperty('--text-color', '#2b5c8f'); root.style.setProperty('--box-bg', 'rgba(255,255,255,0.6)'); root.style.setProperty('--border-color', '#2b5c8f'); break;
            case 'harmonic-dark': root.style.setProperty('--bg-color', '#1e1e24'); root.style.setProperty('--text-color', '#d4d4d8'); root.style.setProperty('--box-bg', 'rgba(255,255,255,0.05)'); root.style.setProperty('--border-color', '#3f3f46'); break;
            case 'harmonic-light': root.style.setProperty('--bg-color', '#f4f4f5'); root.style.setProperty('--text-color', '#18181b'); root.style.setProperty('--box-bg', 'rgba(0,0,0,0.03)'); root.style.setProperty('--border-color', '#a1a1aa'); break;
        }
        log(`已切換主題`);
    }

    function createNewFile() {
        const input = document.getElementById('new-file-name');
        const filename = input.value.trim().replace(/^\/+/, '');
        if (!filename) return log('錯誤: 請輸入檔案名稱', 'error');
        if (files[filename]) return log('錯誤: 檔案已存在', 'error');
        
        files[filename] = { type: 'text', content: '' };
        log(`已建立: ${filename}`);
        input.value = '';
        renderFileList();
        selectFile(filename);
    }

    // === 修改重點：區分檔案與資料夾上傳 ===
    function handleFiles(fileList, isFolder) {
        let count = 0;
        Array.from(fileList).forEach(file => {
            const reader = new FileReader();
            const isImage = file.type.startsWith('image/') || file.name.endsWith('.svg');
            
            // 資料夾模式使用 webkitRelativePath，否則只用檔名
            const path = (isFolder && file.webkitRelativePath) ? file.webkitRelativePath : file.name;

            reader.onload = (e) => {
                files[path] = { 
                    type: isImage ? 'image' : 'text', 
                    content: e.target.result 
                };
                count++;
                log(`已載入: ${path}`);
                renderFileList();
            };
            
            if (isImage) reader.readAsDataURL(file);
            else reader.readAsText(file);
        });
        
        if (fileList.length > 0) {
            setTimeout(() => {
                log(`✅ 成功上傳 ${fileList.length} 個${isFolder ? '資料夾檔案' : '檔案'}`, 'info');
            }, 300);
        }
    }

    function downloadFile(filename) {
        const fileData = files[filename];
        if (!fileData) return;

        if (currentFile === filename && fileData.type === 'text') saveCurrentFile();

        const fileName = filename.substring(filename.lastIndexOf('/') + 1);
        let downloadUrl = fileData.type === 'image' 
            ? fileData.content 
            : URL.createObjectURL(new Blob([fileData.content], { type: 'text/plain;charset=utf-8' }));

        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        if (fileData.type !== 'image') setTimeout(() => URL.revokeObjectURL(downloadUrl), 150);
        log(`✅ 已下載: ${filename}`);
    }

    function saveCurrentFile() {
        if (currentFile && files[currentFile]?.type === 'text') {
            files[currentFile].content = document.getElementById('editor-text').value;
            log(`💾 已儲存: ${currentFile}`);
        }
    }

    function deleteFile(filename) {
        delete files[filename];
        log(`已刪除: ${filename}`, 'error');
        if (currentFile === filename) {
            const remaining = Object.keys(files);
            currentFile = remaining.length > 0 ? remaining[0] : null;
            if (currentFile) selectFile(currentFile);
        }
        renderFileList();
    }

    function downloadAll() {
        if (Object.keys(files).length === 0) return log('沒有檔案可下載', 'error');
        
        const zip = new JSZip();
        for (const filename in files) {
            if (files[filename].type === 'image') {
                const base64 = files[filename].content.split(',')[1];
                zip.file(filename, base64, {base64: true});
            } else {
                zip.file(filename, files[filename].content);
            }
        }
        zip.generateAsync({type: 'blob'}).then(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'project_files.zip';
            a.click();
            log('所有檔案已打包下載');
        });
    }

    // 其餘函數（保持不變）
    function toggleRename(filename) {
        if (isRunning) return;
        editingFile = filename;
        renderFileList();
    }

    function cancelRename() {
        editingFile = null;
        renderFileList();
    }

    function saveRename(oldName) {
        const input = document.getElementById('rename-input');
        const newName = input.value.trim().replace(/^\/+/, '');
        if (!newName) return log('錯誤: 檔案名稱不能為空', 'error');
        if (newName !== oldName && files[newName]) return log(`錯誤: 檔案已存在`, 'error');
        
        files[newName] = files[oldName];
        if (newName !== oldName) delete files[oldName];
        if (currentFile === oldName) currentFile = newName;
        editingFile = null;
        log(`已重新命名：${oldName} → ${newName}`);
        renderFileList();
        selectFile(currentFile);
    }

    function setDevice(mode) {
        const iframe = document.getElementById('preview-iframe');
        iframe.style.width = mode === 'mobile' ? '375px' : '100%';
        log(mode === 'mobile' ? '已切換至手機模式 (375px)' : '已切換至電腦模式');
    }

    function renderFileList() {
        const list = document.getElementById('files');
        list.innerHTML = '';

        const rootFiles = [];
        const folders = {};

        Object.keys(files).forEach(filename => {
            if (filename.includes('/')) {
                const folder = filename.substring(0, filename.lastIndexOf('/'));
                if (!folders[folder]) folders[folder] = [];
                folders[folder].push(filename);
            } else rootFiles.push(filename);
        });

        rootFiles.forEach(f => addFileItem(f, list));
        Object.keys(folders).forEach(folder => {
            const h = document.createElement('div');
            h.style.padding = '8px'; h.style.fontWeight = 'bold'; h.style.fontSize = '12px';
            h.style.borderBottom = '1px dashed var(--border-color)'; h.style.marginTop = '4px';
            h.textContent = `📂 ${folder}`;
            list.appendChild(h);
            folders[folder].forEach(f => addFileItem(f, list, true));
        });
    }

    function addFileItem(filename, container, isSub = false) {
        const li = document.createElement('li');
        li.className = 'file-item';
        if (isSub) li.style.paddingLeft = '24px';

        if (editingFile === filename) {
            li.style.flexDirection = 'column'; li.style.alignItems = 'flex-start'; li.style.gap = '6px';
            li.innerHTML = `
                <div style="display: flex; align-items: center; width: 100%; justify-content: space-between;">
                    <input type="text" id="rename-input" value="${filename}" style="padding:4px;font-size:12px;width:65%;border:1px solid var(--border-color);border-radius:4px;background:var(--box-bg);color:var(--text-color);">
                    <div style="display:flex;gap:4px;">
                        <button onclick="saveRename('${filename}')" style="font-size:10px;padding:2px 6px;">確定</button>
                        <button onclick="cancelRename()" style="font-size:10px;padding:2px 6px;background:var(--bg-color);color:var(--text-color);border:1px solid var(--text-color);">取消</button>
                    </div>
                </div>`;
        } else {
            li.onclick = (e) => { if (!e.target.closest('.file-actions')) selectFile(filename); };
            const isCurrent = (filename === currentFile) && !isRunning;
            const marker = isCurrent ? `<span style="color:var(--text-color);font-size:10px;font-weight:bold;margin-left:6px;">(編輯中)</span>` : '';
            const shortName = filename.substring(filename.lastIndexOf('/') + 1);

            li.innerHTML = `
                <div style="display:flex;align-items:center;">
                    <span>${isSub ? shortName : filename}</span>${marker}
                </div>
                <div class="file-actions">
                    <span onclick="toggleRename('${filename}')" class="file-action-btn" title="重新命名">📝</span>
                    <span onclick="downloadFile('${filename}')" class="file-action-btn" title="下載">📥</span>
                    <span onclick="deleteFile('${filename}')" class="file-action-btn" style="color:#8B0000" title="刪除">❌</span>
                </div>`;
        }
        container.appendChild(li);
    }

    function selectFile(filename) {
        if (isRunning) return;
        currentFile = filename;
        editingFile = null;
        
        const fileData = files[filename];
        const editor = document.getElementById('editor-text');
        const img = document.getElementById('image-preview');

        if (fileData.type === 'image') {
            editor.style.display = 'none';
            img.style.display = 'block';
            img.src = fileData.content;
            document.getElementById('save-btn').disabled = true;
        } else {
            editor.style.display = 'block';
            img.style.display = 'none';
            editor.value = fileData.content;
            document.getElementById('save-btn').disabled = false;
        }
        renderFileList();
    }

    function runCode() {
        if (!files['index.html']) return log('錯誤: 未找到 index.html', 'error');
        isRunning = true;
        renderFileList();
        document.getElementById('editor-text').style.display = 'none';
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('preview-container').style.display = 'flex';

        const iframe = document.getElementById('preview-iframe');
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        let html = files['index.html'].content;

        Object.keys(files).forEach(f => {
            if (files[f].type === 'image') html = html.replaceAll(f, files[f].content);
        });

        doc.open();
        doc.write(html);
        Object.keys(files).forEach(f => {
            if (f.endsWith('.css')) doc.head.innerHTML += `<style>${files[f].content}</style>`;
            if (f.endsWith('.js')) doc.body.innerHTML += `<script>${files[f].content}<\/script>`;
        });
        doc.close();
        log('✅ 專案已運行');
    }

    function stopCode() {
        isRunning = false;
        renderFileList();
        document.getElementById('preview-container').style.display = 'none';
        const fd = files[currentFile];
        if (fd?.type === 'image') document.getElementById('image-preview').style.display = 'block';
        else document.getElementById('editor-text').style.display = 'block';
        log('已停止預覽');
    }
</script>
</body>
</html>
