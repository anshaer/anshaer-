<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>整合式網頁編輯器 - 圖片強化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg-color: #9cf6c7; --text-color: #69350F; --box-bg: rgba(255,255,255,0.5); --border-color: #69350F; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; }
        #toolbar { padding: 10px; gap: 8px; display: flex; flex-wrap: wrap; background: var(--bg-color); border-bottom: 2px solid var(--border-color); }
        button { padding: 8px 14px; border: none; border-radius: 20px; background: var(--text-color); color: var(--bg-color); cursor: pointer; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #display-area { flex: 1; padding: 10px; position: relative; }
        #editor-text, #image-preview { width: 100%; height: 100%; }
        #editor-text { resize: none; background: var(--box-bg); font-family: monospace; }
        #image-preview { object-fit: contain; background: white; display: none; }
        #preview-container { display: none; width: 100%; height: 100%; background: #eee; }
        #preview-iframe { width: 100%; height: 100%; border: none; background: white; }
        #sidebar { width: 280px; border-left: 2px solid var(--border-color); background: var(--bg-color); display: flex; flex-direction: column; }
        #console { height: 180px; background: rgba(255,255,255,0.4); padding: 10px; font-family: monospace; overflow-y: auto; border-top: 2px solid var(--border-color); }
    </style>
</head>
<body>

<div id="toolbar">
    <button onclick="saveCurrentFile()">💾 儲存</button>
    <button onclick="runCode()">▶️ 運行</button>
    <button onclick="stopCode()">⏹️ 停止</button>
    <button onclick="document.getElementById('file-input').click()">📄 上傳檔案</button>
    <input type="file" id="file-input" multiple style="display:none" onchange="handleFiles(this.files, false)">
    <button onclick="downloadAll()">📥 下載全部</button>
</div>

<div id="main">
    <div id="display-area">
        <textarea id="editor-text"></textarea>
        <img id="image-preview" alt="預覽">
        <div id="preview-container"><iframe id="preview-iframe"></iframe></div>
    </div>
    
    <div id="sidebar">
        <div style="padding:10px; flex:1; overflow:auto;">
            <h3>檔案列表</h3>
            <ul id="files" style="list-style:none; padding:0;"></ul>
        </div>
        <div id="console">> Ready</div>
    </div>
</div>

<script>
    let files = {
        'index.html': { 
            type: 'text', 
            content: `<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><title>圖片測試</title></head>
<body>
    <h1>同一層圖片測試</h1>
    <img src="test.jpg" width="400" alt="應該要顯示">
    <p>如果看到圖片就成功了</p>
</body></html>` 
        }
    };

    let currentFile = 'index.html';
    let isRunning = false;

    window.onload = () => { selectFile(currentFile); renderFileList(); };

    function log(msg, type='info') {
        const c = document.getElementById('console');
        c.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    function handleFiles(fileList) {
        Array.from(fileList).forEach(file => {
            const reader = new FileReader();
            const isImage = file.type.startsWith('image/');
            const path = file.name;   // 同一層就只取檔名

            reader.onload = e => {
                files[path] = { type: isImage ? 'image' : 'text', content: e.target.result };
                log(`已載入: ${path}`);
                renderFileList();
            };
            isImage ? reader.readAsDataURL(file) : reader.readAsText(file);
        });
    }

    function selectFile(name) {
        currentFile = name;
        const data = files[name];
        if (data.type === 'image') {
            document.getElementById('editor-text').style.display = 'none';
            document.getElementById('image-preview').style.display = 'block';
            document.getElementById('image-preview').src = data.content;
        } else {
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('editor-text').style.display = 'block';
            document.getElementById('editor-text').value = data.content;
        }
        renderFileList();
    }

    function renderFileList() {
        const ul = document.getElementById('files');
        ul.innerHTML = '';
        Object.keys(files).forEach(f => {
            const li = document.createElement('li');
            li.style.padding = '8px';
            li.style.cursor = 'pointer';
            li.style.background = (f === currentFile) ? 'rgba(255,255,255,0.6)' : '';
            li.textContent = f;
            li.onclick = () => selectFile(f);
            ul.appendChild(li);
        });
    }

    function saveCurrentFile() {
        if (files[currentFile].type === 'text') {
            files[currentFile].content = document.getElementById('editor-text').value;
            log('已儲存');
        }
    }

    function runCode() {
        if (!files['index.html']) return log('缺少 index.html', 'error');

        isRunning = true;
        const iframe = document.getElementById('preview-iframe');
        const doc = iframe.contentDocument || iframe.contentWindow.document;

        document.getElementById('editor-text').style.display = 'none';
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('preview-container').style.display = 'flex';

        let html = files['index.html'].content;

        // === 超強圖片替換（針對同一層）===
        Object.keys(files).forEach(filename => {
            if (files[filename].type === 'image') {
                const b64 = files[filename].content;
                const escaped = filename.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                
                // 各種可能寫法一次替換
                html = html.replace(new RegExp(`src=["']${escaped}["']`, 'gi'), `src="${b64}"`)
                           .replace(new RegExp(`src=["']./${escaped}["']`, 'gi'), `src="${b64}"`)
                           .replace(new RegExp(`url\\(["']?${escaped}["']?\\)`, 'gi'), `url(${b64})`);
            }
        });

        doc.open();
        doc.write(html);

        // 注入虛擬 fetch（保險用）
        const script = doc.createElement('script');
        script.textContent = `
            const images = ${JSON.stringify(Object.fromEntries(
                Object.entries(files).filter(([k,v]) => v.type === 'image').map(([k,v]) => [k, v.content])
            ))};
            
            const oldFetch = fetch;
            fetch = async (url) => {
                let name = url.replace(/^\\.\\/|^\\/+/, '');
                if (images[name]) return fetch(images[name]);
                return oldFetch(url);
            };
            console.log('圖片載入系統已啟動');
        `;
        doc.head.appendChild(script);

        doc.close();
        log('✅ 已運行（已強力替換同一層圖片）');
    }

    function stopCode() {
        isRunning = false;
        document.getElementById('preview-container').style.display = 'none';
        selectFile(currentFile);
        log('已停止');
    }

    function downloadAll() {
        // 簡化版下載
        const zip = new JSZip();
        Object.keys(files).forEach(name => {
            if (files[name].type === 'image') {
                zip.file(name, files[name].content.split(',')[1], {base64:true});
            } else {
                zip.file(name, files[name].content);
            }
        });
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = "project.zip";
            a.click();
        });
    }
</script>
</body>
</html>
